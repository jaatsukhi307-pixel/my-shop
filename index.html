<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Shop</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    background: black;
    color: white;
    padding: 15px;
}

.product {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

.product img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.price {
    color: green;
    font-size: 20px;
    margin: 10px 0;
}

button {
    background: orange;
    border: none;
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: darkorange;
}
</style>

</head>
<body>

<h1>🛒 My Online Store</h1>

<div class="product">
    <img src="https://via.placeholder.com/300" alt="Product">
    <h2>Product Name</h2>
    <p class="price">₹999</p>
    <button onclick="buyNow('Product Name', 999)">Buy Now</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/300" alt="Product">
    <h2>Second Product</h2>
    <p class="price">₹499</p>
    <button onclick="buyNow('Second Product', 499)">Buy Now</button>
</div>

<script>
function buyNow(product, price) {
    let phone = "917015812212"; // apna number daal

    let message = `Hello, I want to order:\nProduct: ${product}\nPrice: ₹${price}`;

    let url = `https://wa.me/${+917015812212}?text=${encodeURIComponent(message)}`;

    window.open(url, '_blank');
}
</script>

</body>
</html>
