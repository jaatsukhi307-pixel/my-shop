<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

/* Header */
header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Products Grid */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Product Card */
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.price {
    color: green;
    font-size: 18px;
    margin: 10px 0;
}

/* Buttons */
.btn {
    padding: 10px;
    border: none;
    border-radius: 6px;
    margin: 5px;
    cursor: pointer;
    width: 100%;
}

.cod { background: green; color: white; }
.pay { background: blue; color: white; }

.btn:hover { opacity: 0.9; }

footer {
    text-align: center;
    padding: 15px;
    background: black;
    color: white;
}
</style>

</head>

<body>

<header>
    <h1>🛒 My Online Store</h1>
</header>

<div class="container">

    <!-- PRODUCT 1 -->
    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Product 1</h3>
        <p class="price">₹999</p>

        <button class="btn cod" onclick="codOrder('Product 1',999)">Cash on Delivery</button>
        <button class="btn pay" onclick="payNow('Product 1',999)">Pay Online</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Product 2</h3>
        <p class="price">₹499</p>

        <button class="btn cod" onclick="codOrder('Product 2',499)">Cash on Delivery</button>
        <button class="btn pay" onclick="payNow('Product 2',499)">Pay Online</button>
    </div>

</div>

<footer>
    📞 Contact: +917015812212
</footer>

<script>

// COD
function codOrder(product, price) {
    let phone = "+917015812212";

    let msg = `Order (COD):
Product: ${product}
Price: ₹${price}`;

    let url = `https://wa.me/${+917015812212}?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
}

// Razorpay
function payNow(product, price) {

    var options = {
        "key": "YOUR_RAZORPAY_KEY",
        "amount": price * 100,
        "currency": "INR",
        "name": "My Store",
        "description": product,

        "handler": function (response){
            alert("Payment Successful ✅");

            let phone = "+917015812212";
            let msg = `Payment Done!
Product: ${product}
Price: ₹${price}
Payment ID: ${response.razorpay_payment_id}`;

            let url = `https://wa.me/${+917015812212}?text=${encodeURIComponent(msg)}`;
            window.open(url, "_blank");
        },

        "theme": { "color": "#3399cc" }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

</script>

</body>
</html>
