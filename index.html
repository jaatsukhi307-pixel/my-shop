<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eaf6f6; }

.header {
    background:white;
    padding:10px;
    display:flex;
    align-items:center;
}

.logo { font-size:20px; font-weight:bold; color:#6a5acd; }

.banner {
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:yellow;
    text-align:center;
    padding:15px;
    font-weight:bold;
}

.products {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card {
    background:white;
    border-radius:10px;
    padding:10px;
    text-align:center;
    position:relative;
}

.card img { width:100%; border-radius:10px; }

.badge {
    position:absolute;
    top:5px;
    right:5px;
    background:teal;
    color:white;
    padding:5px;
    border-radius:6px;
    font-size:12px;
}

.btn {
    margin-top:5px;
    padding:8px;
    width:100%;
    border:none;
    border-radius:5px;
    color:white;
}

.cod { background:green; }
.pay { background:blue; }

</style>
</head>

<body>

<div class="header">
    <div class="logo">MyShop</div>
</div>

<div class="banner">🔥 Budget Deals</div>

<div class="products">

    <div class="card">
        <span class="badge">₹999</span>
        <img src="https://www.google.com/url?sa=t&source=web&rct=j&url=https%3A%2F%2Fwangarattawoollenmills.com.au%2Fthe-original-pure-wool-8ply%2F&ved=0CBYQjRxqFwoTCODVk6rzkJQDFQAAAAAdAAAAABAG&opi=89978449">
        <h4>Product 1</h4>

        <button class="btn cod" onclick="codOrder('Product 1',999)">COD</button>
        <button class="btn pay" onclick="payNow('Product 1',999)">Buy</button>
    </div>

    <div class="card">
        <span class="badge">₹499</span>
        <img src="https://via.placeholder.com/200">
        <h4>Product 2</h4>

        <button class="btn cod" onclick="codOrder('Product 2',499)">COD</button>
        <button class="btn pay" onclick="payNow('Product 2',499)">Buy</button>
    </div>

</div>

<script>

// COD (WhatsApp)
function codOrder(product, price) {
    let phone = "+917015812212"; // apna number daal

    let msg = `Order (COD):
Product: ${product}
Price: ₹${price}`;

    let url = `https://wa.me/${+917015812212}?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
}

// Razorpay Payment
function payNow(product, price) {

    var options = {
        "key": "YOUR_RAZORPAY_KEY",
        "amount": price * 100,
        "currency": "INR",
        "name": "My Shop",
        "description": product,

        "handler": function (response){
            alert("Payment Successful ✅");

            let phone = "+917015812212";
            let msg = `Payment Done!
Product: ${product}
Price: ₹${price}
Payment ID: ${response.razorpay_payment_id}`;

            let url = `https://wa.me/${+917015812212}?text=${encodeURIComponent(msg)}`;
            window.open(url, "_blank");
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

</script>

</body>
</html>
